# Dev projects and core services routing configuration
# All routing is defined here since Docker provider is currently disabled
# (See DOCKER_PROVIDER_ISSUE.md)

http:
  routers:
    # Homepage - Default route
    homepage:
      entryPoints:
        - web
      rule: Host(`localhost`)
      service: homepage-service
      priority: 1

    # Traefik API for homepage status checks (same-origin on localhost)
    traefik-api:
      entryPoints:
        - web
      rule: Host(`localhost`) && PathPrefix(`/api`)
      service: api@internal
      priority: 100

    # Core Services
    docs-mcp:
      entryPoints:
        - web
      rule: Host(`docs.localhost`)
      service: docs-mcp-service
      middlewares:
        - sse-headers

    # docs-mcp fallback route for Windows .localhost DNS issues
    docs-mcp-path:
      entryPoints:
        - web
      rule: Host(`localhost`) && PathPrefix(`/docs`)
      service: docs-mcp-service
      priority: 50
      middlewares:
        - sse-headers
        - docs-strip-prefix

    # docs-mcp messages endpoint (for POST messages in SSE protocol via /docs path)
    docs-mcp-messages:
      entryPoints:
        - web
      rule: Host(`localhost`) && PathPrefix(`/docs/messages`)
      service: docs-mcp-service
      priority: 55
      middlewares:
        - sse-headers
        - docs-messages-strip-prefix

    # docs-mcp messages endpoint (for POST messages returned by SSE handshake - bare /messages path)
    docs-mcp-messages-root:
      entryPoints:
        - web
      rule: Host(`localhost`) && PathPrefix(`/messages`)
      service: docs-mcp-service
      priority: 45
      middlewares:
        - sse-headers

    ollama:
      entryPoints:
        - web
      rule: Host(`ollama.localhost`)
      service: ollama-service

    sonarqube:
      entryPoints:
        - web
      rule: Host(`sonarqube.localhost`)
      service: sonarqube-service

    traefik-dashboard:
      entryPoints:
        - web
      rule: Host(`traefik.localhost`)
      service: api@internal

    # Trivy is API-only with no web UI - use docker exec commands instead
    # trivy:
    #   entryPoints:
    #     - web
    #   rule: Host(`trivy.localhost`)
    #   service: trivy-service

    # Drone disabled until Git provider configured
    # drone:
    #   entryPoints:
    #     - web
    #   rule: Host(`drone.localhost`)
    #   service: drone-service

    # Example: Register your local dev projects here
    # Replace 5173 with your dev server port, add more routes as needed
    #
    # my-project:
    #   entryPoints:
    #     - web
    #   rule: Host(`my-project.localhost`)
    #   service: my-project-service

  middlewares:
    # SSE-specific headers
    sse-headers:
      headers:
        customResponseHeaders:
          Cache-Control: "no-cache"
          Connection: "keep-alive"
          X-Accel-Buffering: "no" # Disable buffering if behind nginx proxy
        customRequestHeaders:
          X-Forwarded-Proto: "http"

    # Strip /docs prefix for PathPrefix route
    docs-strip-prefix:
      stripPrefix:
        prefixes:
          - "/docs"

    # Strip /docs prefix for messages endpoint
    docs-messages-strip-prefix:
      stripPrefix:
        prefixes:
          - "/docs"

  services:
    homepage-service:
      loadBalancer:
        servers:
          - url: http://homepage:80

    docs-mcp-service:
      loadBalancer:
        servers:
          - url: http://docs-mcp:6280
        responseForwarding:
          flushInterval: 1ms # Flush SSE events immediately (1ms for streaming)

    ollama-service:
      loadBalancer:
        servers:
          - url: http://ollama:11434

    sonarqube-service:
      loadBalancer:
        servers:
          - url: http://sonarqube:9000

    trivy-service:
      loadBalancer:
        servers:
          - url: http://trivy:8080

    drone-service:
      loadBalancer:
        servers:
          - url: http://drone-server:80

    # Example local project service
    # my-project-service:
    #   loadBalancer:
    #     servers:
    #       - url: http://host.docker.internal:5173
