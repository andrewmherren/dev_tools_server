entryPoints:
  web:
    address: ":80"

providers:
  # Docker provider currently disabled due to persistent "Error response from daemon" errors
  # See DOCKER_PROVIDER_ISSUE.md for troubleshooting details
  # docker:
  #   endpoint: "unix:///var/run/docker.sock"
  #   exposedByDefault: false
  #   watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: true # Allow access to /api/* endpoints for service status checks

log:
  level: INFO

accessLog: {}
