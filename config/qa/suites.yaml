# QA Suite Definitions
version: "1"
suites:
  fast:
    description: "Fast feedback: lint + unit tests"
    steps:
      - name: lint
        command: "echo 'Configure lint command for your project'"
        required: true
      - name: static-analysis
        command: "echo 'Configure static analysis for your project'"
        required: false
      - name: unit-tests
        command: "echo 'Configure unit test command for your project'"
        required: true

  full:
    description: "Full suite: lint + static analysis + unit tests + integration + e2e"
    steps:
      - name: lint
        command: "echo 'Configure lint command for your project'"
        required: true
      - name: static-analysis
        command: "echo 'Configure static analysis (SonarQube) for your project'"
        required: true
      - name: unit-tests
        command: "echo 'Configure unit test command for your project'"
        required: true
      - name: integration-tests
        command: "echo 'Configure integration test command for your project'"
        required: true
      - name: e2e-tests
        command: "echo 'Configure e2e test command for your project'"
        required: false
      - name: log-inspection
        command: "echo 'Inspect application logs for errors'"
        required: false
