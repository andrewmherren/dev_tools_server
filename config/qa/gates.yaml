# QA Pass/Fail Gates
version: "1"
gates:
  default:
    lint: required
    static_analysis: optional
    unit_tests: required
    coverage_minimum: 0
    integration_tests: optional
    e2e_tests: optional

  strict:
    lint: required
    static_analysis: required
    unit_tests: required
    coverage_minimum: 80
    integration_tests: required
    e2e_tests: optional
