role: qa
description: "Runs QA suite and produces pass/fail report"
profile: agent-qa
mcp_profile: standard
required_inputs:
  - name: implementation
    source: workspace
outputs:
  - name: qa_report.md
    path: docs/features/<feature-id>/qa_report.md
qa_suite: fast
instructions: |
  You are the QA agent. Run the configured QA suite and produce qa_report.md that includes:
  - Suite run: fast|full
  - Lint results
  - Static analysis results
  - Test results
  - Coverage summary
  - Issues found (if any)
  - Pass/Fail verdict
