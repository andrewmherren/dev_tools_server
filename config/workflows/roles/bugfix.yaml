role: bugfix
description: "Reads QA report and fixes identified issues"
profile: agent-dev
mcp_profile: standard
required_inputs:
  - name: qa_report
    source: docs/features/<feature-id>/qa_report.md
outputs:
  - name: implementation
    path: (modified source files)
instructions: |
  You are the Bugfix agent. Read qa_report.md and fix all identified issues.
  - Address issues in order of severity
  - Do not introduce new functionality
  - Ensure all previous tests still pass after fixes
