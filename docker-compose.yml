  homepage:
    container_name: dev-homepage
    image: nginx:alpine
    volumes:
      - ./homepage:/usr/share/nginx/html:ro
    networks:
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 32m
    restart: unless-stopped
