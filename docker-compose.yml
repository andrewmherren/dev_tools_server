networks:
  dev-network:
    driver: bridge
  internal-network:
    driver: bridge
    internal: true

volumes:
  docs-mcp-data:
    driver: local
  nginx-ssl:
    driver: local

services:
  ollama:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.nvidia-ollama
    container_name: ollama-server
    profiles: [human]
    user: "1000:1000"
    volumes:
      - ${OLLAMA_STORAGE_PATH}:/home/ollama/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
    tty: true
    stdin_open: true
    networks:
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    restart: unless-stopped

  docs-mcp:
    container_name: docs-mcp-server
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.docs-mcp
    profiles: [human]
    depends_on:
      - ollama
    user: "1000:1000"
    volumes:
      - docs-mcp-data:/data
    environment:
      - OPENAI_API_BASE=http://ollama:11434/v1
      - DOCS_MCP_EMBEDDING_MODEL=openai:nomic-embed-text
      - OPENAI_API_KEY=dummy
    tty: true
    stdin_open: true
    networks:
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  nginx:
    container_name: ai-dev-nginx
    image: nginx:1.27-alpine
    profiles: [human]
    user: "101:101"
    depends_on:
      - docs-mcp
      - ollama
      - sonarqube
    ports:
      - 127.0.0.1:80:80
      - 127.0.0.1:443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx-ssl:/etc/nginx/ssl
    networks:
      - dev-network
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 128m
    restart: unless-stopped

  sonarqube-db:
    container_name: sonarqube-postgres
    image: postgres:15-alpine
    profiles: [human]
    user: "999:999"
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - ${SONARQUBE_STORAGE_PATH}/postgres:/var/lib/postgresql/data
    networks:
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
    restart: unless-stopped

  sonarqube:
    container_name: sonarqube-server
    image: sonarqube:10-community
    profiles: [human]
    depends_on:
      - sonarqube-db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      - SONAR_WEB_CONTEXT=/sonarqube
    volumes:
      - ${SONARQUBE_STORAGE_PATH}/data:/opt/sonarqube/data
      - ${SONARQUBE_STORAGE_PATH}/extensions:/opt/sonarqube/extensions
      - ${SONARQUBE_STORAGE_PATH}/logs:/opt/sonarqube/logs
    networks:
      - internal-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped
