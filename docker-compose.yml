version: "3.9"
services:
  ollama:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.nvidia-ollama
    container_name: ollama-server
    volumes:
      - ${OLLAMA_STORAGE_PATH}:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
    tty: true
    stdin_open: true
    networks:
      - dev-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
  docs-mcp:
    container_name: docs-mcp-server
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.docs-mcp
    depends_on:
      - ollama
    volumes:
      - docs-mcp-data:/root/.local/share/docs-mcp-server
    environment:
      - OPENAI_API_BASE=http://ollama:11434/v1
      - DOCS_MCP_EMBEDDING_MODEL=openai:nomic-embed-text
      - OPENAI_API_KEY=dummy
    tty: true
    stdin_open: true
    networks:
      - dev-network
  env-manager:
    container_name: env-manager
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile.env-manager
    volumes:
      - ./:/dev_environment
      - ../sandbox:/sandbox
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEV_ENVIRONMENT_ROOT=/dev_environment
      - SANDBOX_ROOT=/sandbox
      - LOG_LEVEL=info
    tty: true
    stdin_open: true
    networks:
      - dev-network
  nginx:
    container_name: ai-dev-nginx
    image: nginx:alpine
    depends_on:
      - docs-mcp
      - ollama
      - env-manager
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - nginx-ssl:/etc/nginx/ssl
    networks:
      - dev-network
    restart: unless-stopped
  web_ui_demo-human:
    container_name: web_ui_demo-human
    image: ubuntu:22.04
    volumes:
      - /sandbox/web_ui_demo:/workspace
    env_file:
      - ./../sandbox/web_ui_demo/.env
    working_dir: /workspace
    networks:
      - dev-network
    tty: true
    stdin_open: true
    command: /bin/bash
networks:
  dev-network:
    driver: bridge
volumes:
  docs-mcp-data:
    driver: local
  nginx-ssl:
    driver: local
