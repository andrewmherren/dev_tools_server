events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Basic settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Upstream services
    upstream docs-mcp {
        server docs-mcp:6280;
    }

    upstream ollama {
        server ollama:11434;
    }

    upstream sonarqube {
        server sonarqube:9000;
    }

    # HTTP server
    server {
        listen 80;
        server_name localhost;

        # Root landing page
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Landing page assets
        location ~ ^/(index\.html|style\.css|script\.js)$ {
            root /usr/share/nginx/html;
        }

        # Docs MCP web API endpoints
        location /web/ {
            proxy_pass http://docs-mcp/web/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Docs MCP manifest
        location = /manifest.json {
            proxy_pass http://docs-mcp/manifest.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Docs MCP icons and images
        location ~ \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            proxy_pass http://docs-mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
        }

        # Docs MCP libraries API
        location /libraries/ {
            proxy_pass http://docs-mcp/libraries/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Docs MCP SSE message endpoints (absolute paths from SSE stream)
        location /messages {
            proxy_pass http://docs-mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Docs MCP proxy
        location /docs-mcp/ {
            proxy_pass http://docs-mcp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /docs-mcp;
            
            # SSE/streaming support (not WebSocket - don't use "upgrade")
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding on;
        }

        # Docs MCP static assets (fallback for absolute paths)
        location ~ ^/(assets|static|js|css|images|fonts|favicon\.ico)(/|$) {
            proxy_pass http://docs-mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # Ollama API proxy (optional - for web-based tools)
        location /ollama/ {
            proxy_pass http://ollama/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # SonarQube web interface and API
        location = /sonarqube {
            return 301 /sonarqube/;
        }

        location ^~ /sonarqube/ {
            proxy_pass http://sonarqube/sonarqube/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
            client_max_body_size 200M;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS server (self-signed certificate)
    # Uncomment after generating certificates with: 
    # docker compose exec nginx openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #   -keyout /etc/nginx/ssl/nginx-selfsigned.key \
