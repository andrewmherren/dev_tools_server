role: developer
description: "Implements feature (or fixes QA-identified issues) according to architecture"
profile: agent-dev
mcp_profile: standard
required_inputs:
  - name: architecture
    source: docs/features/<feature-id>/architecture.md
  - name: qa_report
    source: docs/features/<feature-id>/qa_report.md
    required: false # Only present during fix loops
outputs:
  - name: implementation
    path: (modified source files)
instructions: |
  You are the Developer agent. Implement the feature described in architecture.md.
  If qa_report.md is present, you are in a fix loop — address all issues identified
  in the report before anything else.
  - Follow existing code conventions
  - Write tests alongside implementation
  - Keep changes minimal and surgical
  - Document non-obvious code
