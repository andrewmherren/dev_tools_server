# Agent Registry
# Defines available agents, their roles, container profiles, and MCP access
version: "1"
agents:
  - name: planner
    role: planner
    profile: agent-dev
    mcp_profile: standard
    description: "Feature planning agent"

  - name: architect
    role: architect
    profile: agent-dev
    mcp_profile: standard
    description: "System architecture agent"

  - name: developer
    role: developer
    profile: agent-dev
    mcp_profile: standard
    description: "Feature implementation and fix agent"

  - name: qa
    role: qa
    profile: agent-qa
    mcp_profile: standard
    description: "Quality assurance agent"
