# MCP Tool Allowlist
# Controls which MCP tools agents are permitted to use
version: "1"
profiles:
  standard:
    description: "Standard agent MCP access"
    allowed:
      - server: filesystem
        tools: [read_file, list_directory, search_files]
        notes: "Read-only filesystem access"
      - server: docs-mcp
        tools: ["*"]
        notes: "Full docs-mcp access for knowledge retrieval"
      - server: package-registry
        tools: [search, info]
        notes: "Package lookup only"
      - server: github
        tools: [get_file_contents, list_branches, get_commit, search_code]
        notes: "Read-only GitHub access; no push/create"
    disallowed:
      - server: github
        tools:
          [
            create_or_update_file,
            push_files,
            create_branch,
            delete_branch,
            merge_pull_request,
          ]
        reason: "Autonomous remote writes disallowed by default"
      - server: filesystem
        tools: [write_file, create_directory, delete_file]
        reason: "Write ops require agent-dev-write profile or explicit override"

  agent-dev-write:
    description: "Extended write access for developer agent"
    extends: standard
    allowed:
      - server: filesystem
        tools: ["*"]
        notes: "Full filesystem access in workspace"

  minimal:
    description: "Minimal access for untrusted/exploratory agents"
    allowed:
      - server: docs-mcp
        tools: [search, get]
        notes: "Documentation lookup only"
